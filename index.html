<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="語言練習">
  <title>語言學習助理</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f13;
      --surface: #1a1a24;
      --surface2: #24243a;
      --accent: #7c6ef7;
      --accent2: #a78bfa;
      --text: #e8e8f0;
      --text2: #9090b0;
      --error: #f87171;
      --success: #34d399;
      --border: rgba(255,255,255,0.08);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    .header {
      padding: 16px 20px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }
    .header h1 { font-size: 17px; font-weight: 600; }
    .header-right { display: flex; gap: 8px; align-items: center; }

    /* Mode Tabs */
    .mode-tabs {
      display: flex;
      padding: 12px 16px;
      gap: 8px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }
    .mode-tab {
      flex: 1;
      padding: 8px 4px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: transparent;
      color: var(--text2);
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
    }
    .mode-tab.active {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
      font-weight: 600;
    }

    /* Sub-mode selector (學習模式) */
    .submode-bar {
      display: flex;
      gap: 6px;
      padding: 10px 16px;
      overflow-x: auto;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      scrollbar-width: none;
    }
    .submode-bar::-webkit-scrollbar { display: none; }
    .submode-btn {
      white-space: nowrap;
      padding: 6px 14px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text2);
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .submode-btn.active {
      background: var(--surface2);
      border-color: var(--accent2);
      color: var(--accent2);
    }

    /* Translate output options */
    .output-options {
      display: flex;
      gap: 6px;
      padding: 10px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }
    .output-btn {
      flex: 1;
      padding: 7px 4px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text2);
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
    }
    .output-btn.active {
      background: var(--surface2);
      border-color: var(--success);
      color: var(--success);
    }

    /* Language selector */
    .lang-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }
    .lang-bar label { font-size: 13px; color: var(--text2); white-space: nowrap; }
    .lang-select {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 7px 12px;
      border-radius: 8px;
      font-size: 14px;
    }

    /* Conversation area */
    .conversation {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .msg {
      max-width: 85%;
      padding: 12px 14px;
      border-radius: 16px;
      font-size: 15px;
      line-height: 1.5;
      animation: fadeIn 0.2s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

    .msg.user {
      align-self: flex-end;
      background: var(--accent);
      color: white;
      border-bottom-right-radius: 4px;
    }
    .msg.ai {
      align-self: flex-start;
      background: var(--surface2);
      color: var(--text);
      border-bottom-left-radius: 4px;
    }
    .msg.system {
      align-self: center;
      background: transparent;
      color: var(--text2);
      font-size: 13px;
      text-align: center;
      max-width: 100%;
    }
    .msg .correction {
      margin-top: 8px;
      padding: 8px 10px;
      background: rgba(248, 113, 113, 0.15);
      border-left: 3px solid var(--error);
      border-radius: 4px;
      font-size: 13px;
      color: var(--error);
    }
    .msg .correction .correct {
      color: var(--success);
      margin-top: 4px;
    }

    /* Status bar */
    .status-bar {
      padding: 8px 16px;
      text-align: center;
      font-size: 13px;
      color: var(--text2);
      min-height: 32px;
    }
    .status-bar.listening { color: var(--error); }
    .status-bar.processing { color: var(--accent2); }
    .status-bar.speaking { color: var(--success); }

    /* Controls */
    .controls {
      padding: 16px 20px 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      background: var(--surface);
      border-top: 1px solid var(--border);
    }

    .btn-mic {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      border: none;
      background: var(--accent);
      color: white;
      font-size: 28px;
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 20px rgba(124, 110, 247, 0.4);
      user-select: none;
      -webkit-user-select: none;
    }
    .btn-mic:active, .btn-mic.recording {
      background: var(--error);
      transform: scale(0.95);
      box-shadow: 0 4px 20px rgba(248, 113, 113, 0.5);
    }
    .btn-mic.disabled {
      background: var(--surface2);
      box-shadow: none;
      cursor: not-allowed;
      opacity: 0.5;
    }

    .btn-icon {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text2);
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }
    .btn-icon:active { transform: scale(0.93); }

    /* End session button */
    .btn-end {
      padding: 8px 20px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text2);
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-end:hover { border-color: var(--error); color: var(--error); }

    /* Card generation overlay */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .overlay.show { display: flex; }
    .overlay-card {
      background: var(--surface);
      border-radius: 20px;
      padding: 24px;
      width: 100%;
      max-width: 400px;
      border: 1px solid var(--border);
    }
    .overlay-card h3 { margin-bottom: 16px; font-size: 17px; }
    .overlay-card .card-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-height: 300px;
      overflow-y: auto;
      margin-bottom: 16px;
    }
    .card-item {
      background: var(--surface2);
      border-radius: 10px;
      padding: 12px;
      font-size: 14px;
    }
    .card-item .card-type {
      font-size: 11px;
      color: var(--accent2);
      margin-bottom: 4px;
      font-weight: 600;
      text-transform: uppercase;
    }
    .card-item .card-title { font-weight: 600; margin-bottom: 4px; }
    .card-item .card-desc { color: var(--text2); font-size: 13px; }
    .overlay-actions { display: flex; gap: 10px; }
    .btn-primary {
      flex: 1;
      padding: 12px;
      border-radius: 12px;
      border: none;
      background: var(--accent);
      color: white;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
    }
    .btn-secondary {
      flex: 1;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text);
      font-size: 15px;
      cursor: pointer;
    }

    /* Empty state */
    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: var(--text2);
      text-align: center;
      padding: 40px 20px;
    }
    .empty-state .icon { font-size: 48px; opacity: 0.4; }
    .empty-state p { font-size: 15px; line-height: 1.6; }

    /* Scenario picker */
    .scenario-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      padding: 16px;
    }
    .scenario-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px 12px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
    }
    .scenario-card:active { transform: scale(0.97); border-color: var(--accent); }
    .scenario-card .s-icon { font-size: 28px; margin-bottom: 8px; }
    .scenario-card .s-name { font-size: 14px; font-weight: 600; }
    .scenario-card .s-desc { font-size: 12px; color: var(--text2); margin-top: 4px; }

    .hidden { display: none !important; }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <h1>🗣️ 語言練習</h1>
    <div class="header-right">
      <button class="btn-end hidden" id="btnEnd">結束對話</button>
    </div>
  </div>

  <!-- Mode Tabs -->
  <div class="mode-tabs">
    <button class="mode-tab active" data-mode="learn">🎓 學習模式</button>
    <button class="mode-tab" data-mode="translate">🔄 翻譯模式</button>
  </div>

  <!-- 學習模式：子模式 -->
  <div class="submode-bar" id="submodeBar">
    <button class="submode-btn active" data-sub="free">自由對話</button>
    <button class="submode-btn" data-sub="scenario">情境模擬</button>
    <button class="submode-btn" data-sub="grammar">文法問答</button>
    <button class="submode-btn" data-sub="shadowing">跟讀練習</button>
  </div>

  <!-- 翻譯模式：輸出選項 -->
  <div class="output-options hidden" id="outputOptions">
    <button class="output-btn active" data-out="both">🔊＋📝 語音＋文字</button>
    <button class="output-btn" data-out="audio">🔊 純語音</button>
    <button class="output-btn" data-out="text">📝 純文字</button>
  </div>

  <!-- 語言選擇 -->
  <div class="lang-bar">
    <label>目標語言</label>
    <select class="lang-select" id="langSelect">
      <option value="ja">🇯🇵 日文</option>
      <option value="en">🇺🇸 英文</option>
      <option value="ko">🇰🇷 韓文</option>
      <option value="fr">🇫🇷 法文</option>
      <option value="de">🇩🇪 德文</option>
      <option value="es">🇪🇸 西班牙文</option>
    </select>
  </div>

  <!-- 主內容區 -->
  <div id="mainContent" style="flex:1; display:flex; flex-direction:column; overflow:hidden;">

    <!-- 情境選擇畫面 -->
    <div id="scenarioView" class="hidden">
      <div style="padding: 16px 16px 0; color: var(--text2); font-size: 13px;">選擇練習情境</div>
      <div class="scenario-grid">
        <div class="scenario-card" data-scenario="restaurant">
          <div class="s-icon">🍜</div>
          <div class="s-name">餐廳點餐</div>
          <div class="s-desc">點餐、詢問菜色</div>
        </div>
        <div class="scenario-card" data-scenario="convenience">
          <div class="s-icon">🏪</div>
          <div class="s-name">便利商店</div>
          <div class="s-desc">結帳、詢問商品</div>
        </div>
        <div class="scenario-card" data-scenario="directions">
          <div class="s-icon">🗺️</div>
          <div class="s-name">問路指路</div>
          <div class="s-desc">詢問地點、交通</div>
        </div>
        <div class="scenario-card" data-scenario="hotel">
          <div class="s-icon">🏨</div>
          <div class="s-name">飯店 Check-in</div>
          <div class="s-desc">辦理入住、詢問設施</div>
        </div>
        <div class="scenario-card" data-scenario="shopping">
          <div class="s-icon">🛍️</div>
          <div class="s-name">購物</div>
          <div class="s-desc">詢問價格、試穿</div>
        </div>
        <div class="scenario-card" data-scenario="doctor">
          <div class="s-icon">🏥</div>
          <div class="s-name">看診</div>
          <div class="s-desc">描述症狀、預約</div>
        </div>
      </div>
    </div>

    <!-- 對話畫面 -->
    <div id="conversationView" style="flex:1; display:flex; flex-direction:column; overflow:hidden;">
      <div class="conversation" id="conversation">
        <div class="empty-state" id="emptyState">
          <div class="icon">🎙️</div>
          <p>按住下方麥克風按鈕開始說話<br><span style="font-size:13px; opacity:0.7;">放開後 AI 會回應</span></p>
        </div>
      </div>
    </div>

  </div>

  <!-- 狀態列 -->
  <div class="status-bar" id="statusBar">準備好了，按住麥克風開始</div>

  <!-- 控制區 -->
  <div class="controls">
    <button class="btn-icon" id="btnClear" title="清除對話">🗑️</button>
    <button class="btn-mic" id="btnMic">🎙️</button>
    <button class="btn-icon" id="btnCards" title="生成學習卡片" style="display:none;">📚</button>
  </div>

  <!-- 卡片生成 Overlay -->
  <div class="overlay" id="cardOverlay">
    <div class="overlay-card">
      <h3>📚 本次學習卡片</h3>
      <div class="card-list" id="cardList"></div>
      <div class="overlay-actions">
        <button class="btn-secondary" id="btnDownloadMd">⬇️ 下載 md</button>
        <button class="btn-primary" id="btnSaveNotion">📤 推送 Notion</button>
      </div>
      <button class="btn-secondary" style="width:100%; margin-top:10px;" id="btnCloseOverlay">關閉</button>
    </div>
  </div>

  <script>
    // ─── 設定 ───────────────────────────────────────────────
    // Worker URL：部署後替換
    const WORKER_URL = 'https://chatbot-worker.YOUR_SUBDOMAIN.workers.dev';

    const LANG_NAMES = {
      ja: '日文', en: '英文', ko: '韓文', fr: '法文', de: '德文', es: '西班牙文'
    };

    const SYSTEM_PROMPTS = {
      learn: {
        free: (lang) => `你是一個親切的${LANG_NAMES[lang]}老師。用${LANG_NAMES[lang]}和使用者自由對話。如果使用者說錯了，用下列格式在回應末尾標注：\n[糾錯] 錯誤：xxx → 正確：xxx（原因：xxx）\n保持對話自然輕鬆。`,
        scenario: (lang, scenario) => {
          const scenes = {
            restaurant: `你扮演一家${LANG_NAMES[lang]}餐廳的服務員，使用者是來用餐的客人。全程用${LANG_NAMES[lang]}對話。如果使用者說錯，在回應末尾用 [糾錯] 格式標注。`,
            convenience: `你扮演便利商店的店員，使用者是客人。全程用${LANG_NAMES[lang]}對話。如果使用者說錯，在回應末尾用 [糾錯] 格式標注。`,
            directions: `你扮演一個會說${LANG_NAMES[lang]}的路人，使用者向你問路。全程用${LANG_NAMES[lang]}對話。如果使用者說錯，在回應末尾用 [糾錯] 格式標注。`,
            hotel: `你扮演飯店的前台接待，使用者是要 Check-in 的房客。全程用${LANG_NAMES[lang]}對話。如果使用者說錯，在回應末尾用 [糾錯] 格式標注。`,
            shopping: `你扮演服飾店的店員，使用者是來購物的客人。全程用${LANG_NAMES[lang]}對話。如果使用者說錯，在回應末尾用 [糾錯] 格式標注。`,
            doctor: `你扮演診所的醫生，使用者是病人。全程用${LANG_NAMES[lang]}對話。如果使用者說錯，在回應末尾用 [糾錯] 格式標注。`,
          };
          return scenes[scenario] || scenes.restaurant;
        },
        grammar: (lang) => `你是${LANG_NAMES[lang]}老師。使用者會用中文問你${LANG_NAMES[lang]}的文法或單字問題。請用清楚的方式解釋，附上例句，並用語音朗讀例句讓使用者跟著練習。`,
        shadowing: (lang) => `你是跟讀練習老師。先用${LANG_NAMES[lang]}說一句話，等使用者跟讀後，給予發音和語調的評分（1-5分）並說明需要改進的地方。然後繼續下一句。難度循序漸進。`,
      },
      translate: (lang) => `使用者說中文，你立刻翻譯成${LANG_NAMES[lang]}。只輸出翻譯結果，不加任何解釋或其他文字。語音朗讀翻譯結果。`,
    };

    // ─── 狀態 ───────────────────────────────────────────────
    let currentMode = 'learn';
    let currentSubmode = 'free';
    let currentLang = 'ja';
    let currentScenario = null;
    let outputMode = 'both'; // both / audio / text
    let isRecording = false;
    let mediaRecorder = null;
    let audioChunks = [];
    let conversationHistory = [];
    let sessionActive = false;

    // ─── DOM ────────────────────────────────────────────────
    const btnMic = document.getElementById('btnMic');
    const btnClear = document.getElementById('btnClear');
    const btnCards = document.getElementById('btnCards');
    const btnEnd = document.getElementById('btnEnd');
    const statusBar = document.getElementById('statusBar');
    const conversation = document.getElementById('conversation');
    const emptyState = document.getElementById('emptyState');
    const submodeBar = document.getElementById('submodeBar');
    const outputOptions = document.getElementById('outputOptions');
    const scenarioView = document.getElementById('scenarioView');
    const conversationView = document.getElementById('conversationView');
    const cardOverlay = document.getElementById('cardOverlay');
    const cardList = document.getElementById('cardList');

    // ─── Mode 切換 ──────────────────────────────────────────
    document.querySelectorAll('.mode-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        currentMode = tab.dataset.mode;
        submodeBar.classList.toggle('hidden', currentMode !== 'learn');
        outputOptions.classList.toggle('hidden', currentMode !== 'translate');
        if (currentMode === 'learn' && currentSubmode === 'scenario' && !sessionActive) {
          scenarioView.classList.remove('hidden');
          conversationView.style.display = 'none';
        } else {
          scenarioView.classList.add('hidden');
          conversationView.style.display = 'flex';
        }
        setStatus('準備好了，按住麥克風開始');
      });
    });

    // ─── Submode 切換 ───────────────────────────────────────
    document.querySelectorAll('.submode-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.submode-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentSubmode = btn.dataset.sub;
        if (currentSubmode === 'scenario' && !sessionActive) {
          scenarioView.classList.remove('hidden');
          conversationView.style.display = 'none';
        } else {
          scenarioView.classList.add('hidden');
          conversationView.style.display = 'flex';
        }
      });
    });

    // ─── 情境選擇 ───────────────────────────────────────────
    document.querySelectorAll('.scenario-card').forEach(card => {
      card.addEventListener('click', () => {
        currentScenario = card.dataset.scenario;
        scenarioView.classList.add('hidden');
        conversationView.style.display = 'flex';
        addMessage('system', `情境：${card.querySelector('.s-name').textContent}　語言：${LANG_NAMES[currentLang]}`);
        sessionActive = true;
        btnEnd.classList.remove('hidden');
      });
    });

    // ─── 輸出模式切換 ───────────────────────────────────────
    document.querySelectorAll('.output-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.output-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        outputMode = btn.dataset.out;
      });
    });

    // ─── 語言切換 ───────────────────────────────────────────
    document.getElementById('langSelect').addEventListener('change', e => {
      currentLang = e.target.value;
    });

    // ─── 麥克風 ─────────────────────────────────────────────
    btnMic.addEventListener('mousedown', startRecording);
    btnMic.addEventListener('touchstart', e => { e.preventDefault(); startRecording(); }, { passive: false });
    btnMic.addEventListener('mouseup', stopRecording);
    btnMic.addEventListener('mouseleave', stopRecording);
    btnMic.addEventListener('touchend', stopRecording);

    async function startRecording() {
      if (isRecording) return;
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRecorder = new MediaRecorder(stream);
        audioChunks = [];
        mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
        mediaRecorder.start();
        isRecording = true;
        btnMic.classList.add('recording');
        btnMic.textContent = '⏹️';
        setStatus('錄音中…', 'listening');
      } catch (err) {
        setStatus('無法存取麥克風，請確認權限', '');
      }
    }

    async function stopRecording() {
      if (!isRecording || !mediaRecorder) return;
      isRecording = false;
      btnMic.classList.remove('recording');
      btnMic.textContent = '🎙️';

      mediaRecorder.stop();
      mediaRecorder.stream.getTracks().forEach(t => t.stop());

      mediaRecorder.onstop = async () => {
        const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
        if (audioBlob.size < 1000) { setStatus('太短了，請再說一次'); return; }
        await sendToWorker(audioBlob);
      };
    }

    // ─── 送出至 Worker ──────────────────────────────────────
    async function sendToWorker(audioBlob) {
      setStatus('AI 思考中…', 'processing');
      btnMic.classList.add('disabled');

      try {
        const systemPrompt = getSystemPrompt();
        const formData = new FormData();
        formData.append('audio', audioBlob, 'recording.webm');
        formData.append('systemPrompt', systemPrompt);
        formData.append('history', JSON.stringify(conversationHistory));
        formData.append('lang', currentLang);
        formData.append('mode', currentMode);
        formData.append('outputMode', outputMode);

        const res = await fetch(`${WORKER_URL}/chat`, {
          method: 'POST',
          body: formData,
        });

        if (!res.ok) throw new Error(`Worker 回傳 ${res.status}`);

        const data = await res.json();

        // 顯示使用者說的話（由 Worker 轉錄）
        if (data.userText) {
          addMessage('user', data.userText);
          conversationHistory.push({ role: 'user', content: data.userText });
        }

        // 顯示 AI 回應文字
        if (data.aiText && (outputMode === 'text' || outputMode === 'both')) {
          const aiText = data.aiText;
          const correctionMatch = aiText.match(/\[糾錯\]\s*(.*)/s);
          const mainText = aiText.replace(/\[糾錯\][\s\S]*$/, '').trim();
          addMessage('ai', mainText, correctionMatch ? correctionMatch[1].trim() : null);
        }

        // 播放 AI 語音
        if (data.audioBase64 && (outputMode === 'audio' || outputMode === 'both')) {
          await playAudio(data.audioBase64);
        }

        if (data.aiText) {
          conversationHistory.push({ role: 'assistant', content: data.aiText });
        }

        sessionActive = true;
        btnEnd.classList.remove('hidden');
        if (conversationHistory.length >= 4) btnCards.style.display = 'flex';
        setStatus('說完了嗎？繼續按住麥克風', '');

      } catch (err) {
        setStatus('連線失敗：' + err.message, '');
        console.error(err);
      } finally {
        btnMic.classList.remove('disabled');
      }
    }

    function getSystemPrompt() {
      if (currentMode === 'translate') return SYSTEM_PROMPTS.translate(currentLang);
      const sub = currentSubmode;
      if (sub === 'scenario') return SYSTEM_PROMPTS.learn.scenario(currentLang, currentScenario || 'restaurant');
      return SYSTEM_PROMPTS.learn[sub](currentLang);
    }

    // ─── 播放音訊 ───────────────────────────────────────────
    async function playAudio(base64) {
      setStatus('AI 說話中…', 'speaking');
      return new Promise(resolve => {
        const audio = new Audio('data:audio/mp3;base64,' + base64);
        audio.onended = () => { setStatus('說完了嗎？繼續按住麥克風', ''); resolve(); };
        audio.onerror = resolve;
        audio.play().catch(resolve);
      });
    }

    // ─── 訊息顯示 ───────────────────────────────────────────
    function addMessage(type, text, correction = null) {
      emptyState.classList.add('hidden');
      const div = document.createElement('div');
      div.className = `msg ${type}`;
      div.textContent = text;
      if (correction) {
        const lines = correction.split('\n').filter(Boolean);
        const corrDiv = document.createElement('div');
        corrDiv.className = 'correction';
        corrDiv.innerHTML = lines.map((l, i) =>
          i === 0 ? `❌ ${l}` : `<div class="correct">✅ ${l}</div>`
        ).join('');
        div.appendChild(corrDiv);
      }
      conversation.appendChild(div);
      conversation.scrollTop = conversation.scrollHeight;
    }

    function setStatus(text, cls = '') {
      statusBar.textContent = text;
      statusBar.className = 'status-bar' + (cls ? ` ${cls}` : '');
    }

    // ─── 清除對話 ───────────────────────────────────────────
    btnClear.addEventListener('click', () => {
      if (!confirm('清除本次對話？')) return;
      conversation.innerHTML = '';
      conversation.appendChild(emptyState);
      emptyState.classList.remove('hidden');
      conversationHistory = [];
      sessionActive = false;
      btnEnd.classList.add('hidden');
      btnCards.style.display = 'none';
      setStatus('準備好了，按住麥克風開始');
    });

    // ─── 結束對話 ───────────────────────────────────────────
    btnEnd.addEventListener('click', async () => {
      if (conversationHistory.length < 2) { alert('對話太短，無法生成卡片'); return; }
      await generateCards();
    });

    btnCards.addEventListener('click', generateCards);

    // ─── 生成學習卡片 ────────────────────────────────────────
    async function generateCards() {
      setStatus('生成學習卡片中…', 'processing');
      try {
        const res = await fetch(`${WORKER_URL}/cards`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ history: conversationHistory, lang: currentLang }),
        });
        const data = await res.json();
        if (data.cards && data.cards.length > 0) {
          showCardOverlay(data.cards);
        } else {
          alert('這次對話沒有發現值得記錄的單字或文法。');
        }
      } catch (err) {
        alert('生成失敗：' + err.message);
      } finally {
        setStatus('', '');
      }
    }

    function showCardOverlay(cards) {
      cardList.innerHTML = '';
      cards.forEach(card => {
        const div = document.createElement('div');
        div.className = 'card-item';
        div.innerHTML = `
          <div class="card-type">${card.type}</div>
          <div class="card-title">${card.title}</div>
          <div class="card-desc">${card.description}</div>
          ${card.examples ? `<div class="card-desc" style="margin-top:6px">${card.examples.map(e => `• ${e}`).join('<br>')}</div>` : ''}
        `;
        cardList.appendChild(div);
      });
      cardOverlay.classList.add('show');

      // 下載 md
      document.getElementById('btnDownloadMd').onclick = () => downloadMd(cards);
      // 推送 Notion
      document.getElementById('btnSaveNotion').onclick = () => pushToNotion(cards);
    }

    document.getElementById('btnCloseOverlay').addEventListener('click', () => {
      cardOverlay.classList.remove('show');
    });

    function downloadMd(cards) {
      const date = new Date().toLocaleDateString('zh-TW');
      let md = `# 語言學習筆記　${date}\n\n`;
      md += `語言：${LANG_NAMES[currentLang]}\n\n---\n\n`;
      cards.forEach(card => {
        md += `## ${card.type}：${card.title}\n\n`;
        md += `${card.description}\n\n`;
        if (card.examples) {
          card.examples.forEach(e => { md += `- ${e}\n`; });
          md += '\n';
        }
      });
      const blob = new Blob([md], { type: 'text/markdown' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `語言學習_${date.replace(/\//g, '-')}.md`;
      a.click();
    }

    async function pushToNotion(cards) {
      const btn = document.getElementById('btnSaveNotion');
      btn.textContent = '推送中…';
      btn.disabled = true;
      try {
        const res = await fetch(`${WORKER_URL}/notion`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ cards, lang: currentLang }),
        });
        const data = await res.json();
        if (data.success) {
          btn.textContent = '✅ 已推送';
        } else {
          btn.textContent = '❌ 失敗，請重試';
          btn.disabled = false;
        }
      } catch (err) {
        btn.textContent = '❌ 失敗：' + err.message;
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
